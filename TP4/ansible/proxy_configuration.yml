- name: Proxy configuration
  remote_user: ubuntu
  become: true
  hosts: proxy

  handlers:
    - name: restart postgres
      service: name=postgresql state=restarted

  tasks:
    - name: Update apt cache and install postgresql
      apt:
        name: pgpool2
        state: present

    - name: Copy Pgpool configuration file
      template:
        src: ../pgpool.conf
        dest: /etc/pgpool2/pgpool.conf